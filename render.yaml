services:
  - type: web
    name: meetbot
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  - type: pserv
    name: meetbot-db
    ipAddress: private
    plan: free
    dbName: meetbot
    user: postgres
